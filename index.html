<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Pose Guide - 自媒體構圖助手</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0; overflow: hidden; background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            height: 100vh; height: 100dvh;
        }
        .canvas-container { position: relative; width: 100%; height: 100%; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        /* 主畫布：影像+骨架，拍照截圖來源，不含格線 */
        #output_canvas { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }

        /* 格線畫布：獨立疊加，拍照時不截這個 ★ */
        #grid_canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; pointer-events:none; z-index:4; }

        .mirror { transform: scaleX(-1); }

        .ui-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            pointer-events:none;
            display:flex; flex-direction:column; justify-content:space-between;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            z-index:10;
        }
        .guide-template {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:45%; height:90%;
            border:2px dashed rgba(255,255,255,0.4); border-radius:120px;
            transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            z-index:5; pointer-events:none;
        }
        .perfect-match { border:4px solid #4ade80; box-shadow:0 0 30px rgba(74,222,128,0.5); background:rgba(74,222,128,0.05); }

        .glass-btn {
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.2);
            color:white; padding:10px 18px; border-radius:999px;
            font-size:14px; pointer-events:auto; transition:all 0.2s; cursor:pointer;
        }
        .glass-btn:active { transform:scale(0.9); background:rgba(255,255,255,0.3); }

        #capture-btn {
            width:72px; height:72px; background:white; border-radius:50%;
            border:5px solid rgba(255,255,255,0.3); box-shadow:0 0 20px rgba(0,0,0,0.4);
            pointer-events:auto; transition:all 0.2s; cursor:pointer; flex-shrink:0;
        }
        #capture-btn:active { transform:scale(0.85); background:#eee; }

        .flash-effect { animation:flash 0.2s ease-out forwards; }
        @keyframes flash { 0%{background:#fff;opacity:1} 100%{background:transparent;opacity:0} }

        .loading-screen {
            position:fixed; inset:0; background:#000;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:100; color:white; transition:opacity 0.5s;
        }

        #tip-box {
            position:absolute; bottom:148px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.72); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
            color:white; padding:10px 20px; border-radius:999px;
            font-size:13px; font-weight:500; z-index:20;
            pointer-events:none; transition:opacity 0.3s;
            border:1px solid rgba(255,255,255,0.15);
            max-width:88vw; text-align:center; line-height:1.4;
        }

        /* 點擊追蹤圈 */
        #track-ring {
            position:absolute; width:58px; height:58px;
            border:2px solid #facc15; border-radius:50%;
            transform:translate(-50%,-50%);
            pointer-events:none; z-index:8; transition:opacity 0.3s;
            box-shadow:0 0 12px rgba(250,204,21,0.45);
        }

        /* 底部按鈕列 */
        .bottom-bar {
            display:flex; justify-content:center; align-items:center;
            gap:28px; padding-bottom:8px;
        }
        .side-btn {
            display:flex; flex-direction:column; align-items:center; gap:5px;
            pointer-events:auto; cursor:pointer; background:none; border:none;
        }
        .side-btn .icon-wrap {
            width:48px; height:48px; border-radius:50%;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.2);
            display:flex; align-items:center; justify-content:center;
            font-size:19px; transition:all 0.2s;
        }
        .side-btn:active .icon-wrap { transform:scale(0.88); background:rgba(255,255,255,0.3); }
        .side-btn.on .icon-wrap { background:rgba(255,220,50,0.35); border-color:rgba(255,220,50,0.6); }
        .side-btn .lbl { font-size:11px; color:rgba(255,255,255,0.6); }

        /* 主題面板 */
        #theme-panel {
            position:absolute; bottom:0; left:0; right:0;
            background:rgba(8,8,8,0.94);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-top:1px solid rgba(255,255,255,0.1);
            z-index:30; padding:20px 16px calc(20px + env(safe-area-inset-bottom));
            transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
        }
        #theme-panel.open { transform:translateY(0); }
        .theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
        .theme-card {
            display:flex; flex-direction:column; align-items:center; gap:6px;
            background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
            border-radius:14px; padding:14px 6px; cursor:pointer; transition:all 0.18s;
            pointer-events:auto;
        }
        .theme-card:active { transform:scale(0.93); }
        .theme-card.selected { background:rgba(74,222,128,0.18); border-color:#4ade80; }
        .theme-card .t-icon { font-size:26px; line-height:1; }
        .theme-card .t-name { font-size:13px; color:rgba(255,255,255,0.9); font-weight:600; }
        .theme-card .t-hint { font-size:10px; color:rgba(255,255,255,0.4); text-align:center; line-height:1.35; }
        #theme-close {
            width:100%; background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15); border-radius:12px;
            color:rgba(255,255,255,0.7); padding:12px; font-size:14px;
            cursor:pointer; margin-top:14px; pointer-events:auto;
        }
        #camera-indicator { font-size:10px; color:rgba(255,255,255,0.4); margin-top:3px; }
    </style>
</head>
<body>

<div id="flash-layer" style="position:fixed;inset:0;pointer-events:none;z-index:50;"></div>

<div id="setup-box" class="loading-screen">
    <div style="font-size:3rem;margin-bottom:1.5rem;">📸</div>
    <h2 style="font-size:1.5rem;font-weight:700;margin:0 0 8px;">AI 構圖助手</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:14px;margin:0 0 2rem;padding:0 2rem;text-align:center;">
        專為自媒體設計的 AI 拍攝嚮導，即時對位提醒
    </p>
    <button id="start-btn" style="background:white;color:#000;padding:14px 48px;border-radius:999px;font-size:17px;font-weight:700;border:none;cursor:pointer;">
        開始使用
    </button>
    <p id="error-text" style="color:#f87171;font-size:13px;margin-top:1.5rem;padding:0 1.5rem;text-align:center;display:none;"></p>
</div>

<div class="canvas-container" id="main-container">
    <video id="input_video" autoplay muted playsinline></video>

    <!-- 主畫布：拍照截圖來源（無格線）-->
    <canvas id="output_canvas" class="mirror"></canvas>

    <!-- 格線畫布：顯示用，拍照不截此層 ★ -->
    <canvas id="grid_canvas" class="mirror"></canvas>

    <!-- 點擊追蹤圈 -->
    <div id="track-ring" style="opacity:0;top:50%;left:50%;"></div>

    <!-- 構圖框 -->
    <div id="guide-box" class="guide-template"></div>

    <div class="ui-overlay">
        <!-- 頂部 -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;">
            <div style="background:rgba(0,0,0,0.45);color:white;padding:10px 14px;border-radius:14px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);">
                <div style="font-weight:700;font-size:15px;">AI 助手</div>
                <div id="status-text" style="font-size:10px;color:#4ade80;font-family:monospace;letter-spacing:0.08em;">系統準備中</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;pointer-events:auto;">
                <button id="switch-camera-btn" class="glass-btn">前鏡頭 🔄</button>
                <div id="camera-indicator">點擊切換前/後鏡頭</div>
            </div>
        </div>

        <!-- 完美構圖提示 -->
        <div id="pose-indicator" style="align-self:center;background:rgba(74,222,128,0.9);color:white;padding:8px 24px;border-radius:999px;font-size:14px;font-weight:700;opacity:0;transition:opacity 0.3s;backdrop-filter:blur(8px);">
            ✨ 完美構圖！請拍照 ✨
        </div>

        <!-- 底部按鈕 -->
        <div class="bottom-bar">
            <button class="side-btn" id="grid-side-btn" onclick="toggleGrid()">
                <div class="icon-wrap">⊞</div>
                <span class="lbl">格線</span>
            </button>
            <button id="capture-btn" aria-label="拍照"></button>
            <button class="side-btn" onclick="openThemePanel()" id="theme-side-btn">
                <div class="icon-wrap">🎯</div>
                <span class="lbl" id="theme-lbl">主題</span>
            </button>
        </div>
    </div>

    <div id="tip-box" style="opacity:0;">請站入構圖框</div>
</div>

<!-- 主題選單 -->
<div id="theme-panel">
    <p style="color:rgba(255,255,255,0.45);font-size:12px;margin:0 0 14px;text-align:center;letter-spacing:0.04em;">
        選擇拍攝主題，AI 會給對應的構圖建議<br>
        <span style="font-size:11px;color:rgba(255,255,255,0.3);">也可直接點畫面上的主體進行鎖定追蹤</span>
    </p>
    <div class="theme-grid" id="theme-grid"></div>
    <button id="theme-close" onclick="closeThemePanel()">完成</button>
</div>

<script>
const videoEl       = document.getElementById('input_video');
const mainCanvas    = document.getElementById('output_canvas');
const ctx           = mainCanvas.getContext('2d');
const gridCanvas    = document.getElementById('grid_canvas');
const gridCtx       = gridCanvas.getContext('2d');
const statusText    = document.getElementById('status-text');
const guideBox      = document.getElementById('guide-box');
const indicator     = document.getElementById('pose-indicator');
const setupBox      = document.getElementById('setup-box');
const startBtn      = document.getElementById('start-btn');
const switchBtn     = document.getElementById('switch-camera-btn');
const captureBtn    = document.getElementById('capture-btn');
const flashLayer    = document.getElementById('flash-layer');
const errorText     = document.getElementById('error-text');
const tipBox        = document.getElementById('tip-box');
const trackRing     = document.getElementById('track-ring');
const themePanel    = document.getElementById('theme-panel');
const themeGrid     = document.getElementById('theme-grid');
const themeLbl      = document.getElementById('theme-lbl');
const gridSideBtn   = document.getElementById('grid-side-btn');
const cameraIndicator = document.getElementById('camera-indicator');
const mainContainer = document.getElementById('main-container');

let isMatch = false;
let currentFacingMode = "user";
let localStream = null;
let isProcessing = false;
let showGrid = false;
let lastLandmarks = null;
let trackedPoint = null;  // 追蹤點，畫面比例座標 {x,y}

// ── 主題定義 ──────────────────────────────────
const THEMES = [
    {
        id:'portrait', name:'人像', icon:'🧍', hint:'全身入鏡',
        guide:{ w:'45%', h:'88%', r:'120px' },
        tips:{ high:'⬇️ 頭部偏高，鏡頭往下', low:'⬆️ 主體偏低，往上移', left:'➡️ 往右移動一些', right:'⬅️ 往左移動一些', tilt:'📐 肩膀不水平，放鬆站姿', ok:'✅ 人像構圖完美，可以拍！' }
    },
    {
        id:'halfbody', name:'半身', icon:'🙎', hint:'上半身特寫',
        guide:{ w:'65%', h:'56%', r:'40px' },
        tips:{ high:'⬇️ 臉部偏高，往下移', low:'⬆️ 主體偏低，往上移', left:'➡️ 往右移動', right:'⬅️ 往左移動', tilt:'📐 注意頭部傾斜', ok:'✅ 半身構圖到位！' }
    },
    {
        id:'food', name:'食物', icon:'🍽️', hint:'俯拍/側拍',
        guide:{ w:'75%', h:'75%', r:'16px' },
        tips:{ high:'📷 嘗試靠近主體', low:'📷 往後退一些', left:'➡️ 主體移至中央', right:'⬅️ 主體移至中央', tilt:'📐 保持水平更好看', ok:'✅ 食物擺盤構圖讚！' }
    },
    {
        id:'landscape', name:'風景', icon:'🌄', hint:'三分法最佳',
        guide:{ w:'92%', h:'52%', r:'12px' },
        tips:{ high:'⬇️ 地平線偏高，往下調', low:'⬆️ 地平線偏低，往上調', left:'➡️ 主體移至黃金點', right:'⬅️ 主體移至黃金點', tilt:'📐 保持水平，避免歪斜', ok:'✅ 風景構圖完美！' }
    },
];

let currentThemeId = 'portrait';
const currentTheme = () => THEMES.find(t => t.id === currentThemeId);

// ── MediaPipe ─────────────────────────────────
const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity:1, smoothLandmarks:true, minDetectionConfidence:0.6, minTrackingConfidence:0.6 });

pose.onResults(results => {
    if (!results.image) return;

    // 同步畫布尺寸
    if (mainCanvas.width !== videoEl.videoWidth) {
        mainCanvas.width = gridCanvas.width = videoEl.videoWidth;
        mainCanvas.height = gridCanvas.height = videoEl.videoHeight;
    }

    // ── 主畫布：影像 + 骨架（拍照用）──
    ctx.save();
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    if (currentFacingMode === "user") { ctx.translate(mainCanvas.width,0); ctx.scale(-1,1); }
    ctx.drawImage(results.image, 0, 0, mainCanvas.width, mainCanvas.height);
    if (results.poseLandmarks) {
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color:'rgba(255,255,255,0.55)', lineWidth:2});
        drawLandmarks(ctx, results.poseLandmarks, {color:'#4ade80', lineWidth:1, radius:2});
    }
    ctx.restore();

    // ── 格線畫布（顯示用，不進截圖）──
    gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
    if (showGrid) drawThirdGrid();

    // ── 骨架判斷 ──
    if (results.poseLandmarks) {
        lastLandmarks = results.poseLandmarks;
        statusText.innerText = "已鎖定主體";
        statusText.style.color = "#4ade80";
        evaluateComposition(results.poseLandmarks);
        updateTrackRing(results.poseLandmarks);
    } else {
        lastLandmarks = null;
        statusText.innerText = "偵測中...";
        statusText.style.color = "rgba(255,255,255,0.4)";
        if (isMatch) { isMatch=false; guideBox.classList.remove('perfect-match'); indicator.style.opacity="0"; }
        showTip("請站在鏡頭前，確保主體可見");
        trackRing.style.opacity = "0";
    }
});

// ── 格線（畫在 gridCanvas）──
function drawThirdGrid() {
    const w = gridCanvas.width, h = gridCanvas.height;
    gridCtx.save();
    gridCtx.strokeStyle = 'rgba(255,255,255,0.32)';
    gridCtx.lineWidth = 1.5;
    gridCtx.setLineDash([6,6]);
    for (let i=1;i<3;i++) {
        gridCtx.beginPath(); gridCtx.moveTo(w/3*i,0); gridCtx.lineTo(w/3*i,h); gridCtx.stroke();
        gridCtx.beginPath(); gridCtx.moveTo(0,h/3*i); gridCtx.lineTo(w,h/3*i); gridCtx.stroke();
    }
    gridCtx.setLineDash([]);
    gridCtx.fillStyle = 'rgba(255,220,50,0.8)';
    [[1,1],[2,1],[1,2],[2,2]].forEach(([xi,yi]) => {
        gridCtx.beginPath(); gridCtx.arc(w/3*xi,h/3*yi,5,0,Math.PI*2); gridCtx.fill();
    });
    gridCtx.restore();
}

// ── 追蹤圈 ──
function updateTrackRing(landmarks) {
    if (!trackedPoint) { trackRing.style.opacity="0"; return; }
    let best=null, bestDist=Infinity;
    landmarks.forEach(lm => {
        const d = Math.hypot(lm.x - trackedPoint.x, lm.y - trackedPoint.y);
        if (d < bestDist) { bestDist=d; best=lm; }
    });
    if (!best || bestDist > 0.3) { trackRing.style.opacity="0"; return; }
    const cw = mainContainer.clientWidth, ch = mainContainer.clientHeight;
    let px = best.x * cw;
    if (currentFacingMode === "user") px = cw - px;
    trackRing.style.left = px + 'px';
    trackRing.style.top  = (best.y * ch) + 'px';
    trackRing.style.opacity = "1";
}

// ── 構圖評估 ──
function evaluateComposition(landmarks) {
    const nose = landmarks[0];
    const ls = landmarks[11], rs = landmarks[12];
    if (!nose) return;
    const T = currentTheme().tips;
    const nx=nose.x, ny=nose.y;
    let tip = "";
    if      (ny < 0.12) tip = T.high;
    else if (ny > 0.48) tip = T.low;
    else if (nx < 0.28) tip = T.left;
    else if (nx > 0.72) tip = T.right;
    else if (ls && rs && Math.abs(ls.y-rs.y) > 0.06) tip = T.tilt;
    else tip = T.ok;
    showTip(tip);

    const isPerfect = ny>0.14 && ny<0.42 && nx>0.28 && nx<0.72;
    if (isPerfect !== isMatch) {
        isMatch = isPerfect;
        guideBox.classList.toggle('perfect-match', isPerfect);
        indicator.style.opacity = isPerfect ? "1" : "0";
    }
}

let tipTimer=null;
function showTip(text) {
    tipBox.textContent = text; tipBox.style.opacity = "1";
    clearTimeout(tipTimer);
    tipTimer = setTimeout(() => { tipBox.style.opacity="0"; }, 3500);
}

// ── 相機初始化 ──
async function initCamera(mode) {
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream=null; }
    videoEl.srcObject = null;
    await new Promise(r => setTimeout(r, 300));
    const list = [
        { video:{ facingMode: mode==="user" ? "user" : {exact:"environment"}, width:{ideal:1280}, height:{ideal:720} } },
        { video:{ facingMode: mode==="user" ? "user" : "environment", width:{ideal:1280}, height:{ideal:720} } },
        { video: true }
    ];
    let stream=null;
    for (const c of list) { try { stream=await navigator.mediaDevices.getUserMedia(c); break; } catch(e){} }
    if (!stream) throw new Error("No stream");
    localStream=stream; videoEl.srcObject=stream;
    const isMirror = mode==="user";
    mainCanvas.classList.toggle('mirror', isMirror);
    gridCanvas.classList.toggle('mirror', isMirror);
    await videoEl.play();
}

// ── 主題面板 ──
function buildThemeGrid() {
    themeGrid.innerHTML='';
    THEMES.forEach(t => {
        const card = document.createElement('div');
        card.className = 'theme-card' + (t.id===currentThemeId ? ' selected':'');
        card.innerHTML = `<div class="t-icon">${t.icon}</div><div class="t-name">${t.name}</div><div class="t-hint">${t.hint}</div>`;
        card.onclick = () => selectTheme(t.id);
        themeGrid.appendChild(card);
    });
}
function selectTheme(id) {
    currentThemeId = id;
    const t = currentTheme();
    guideBox.style.width=t.guide.w; guideBox.style.height=t.guide.h; guideBox.style.borderRadius=t.guide.r;
    themeLbl.textContent = t.name;
    document.querySelectorAll('.theme-card').forEach((el,i) => el.classList.toggle('selected', THEMES[i].id===id));
    showTip(`已切換主題：${t.name} ${t.icon}  ${t.hint}`);
}
function openThemePanel() { buildThemeGrid(); themePanel.classList.add('open'); }
function closeThemePanel() { themePanel.classList.remove('open'); }

// ── 格線切換 ──
function toggleGrid() {
    showGrid = !showGrid;
    gridSideBtn.classList.toggle('on', showGrid);
    gridSideBtn.querySelector('.icon-wrap').textContent = showGrid ? '✓' : '⊞';
    if (!showGrid) gridCtx.clearRect(0,0,gridCanvas.width,gridCanvas.height);
}

// ── 點擊追蹤 ──
mainContainer.addEventListener('click', e => {
    if (!isProcessing) return;
    if (e.target.closest('button, #theme-panel, #guide-box')) return;
    const rect = mainContainer.getBoundingClientRect();
    let rx = (e.clientX - rect.left) / rect.width;
    const ry = (e.clientY - rect.top) / rect.height;
    if (currentFacingMode === "user") rx = 1 - rx;
    trackedPoint = { x:rx, y:ry };
    trackRing.style.left = (e.clientX - rect.left) + 'px';
    trackRing.style.top  = (e.clientY - rect.top)  + 'px';
    trackRing.style.opacity = "1";
    showTip("🎯 已鎖定主體，持續追蹤中...");
    if (!lastLandmarks) setTimeout(() => { trackedPoint=null; trackRing.style.opacity="0"; }, 2000);
});

// ── 事件 ──
startBtn.addEventListener('click', async () => {
    startBtn.disabled=true; startBtn.textContent="啟動中...";
    try {
        await initCamera(currentFacingMode);
        setupBox.style.opacity="0"; setTimeout(() => setupBox.style.display='none', 500);
        isProcessing=true; processFrame(); updateCameraLabel();
    } catch(e) {
        errorText.textContent="無法存取相機，請確認已開啟相機權限。";
        errorText.style.display="block";
        startBtn.disabled=false; startBtn.textContent="重試";
    }
});

switchBtn.addEventListener('click', async () => {
    if (!isProcessing) return;
    switchBtn.disabled=true; switchBtn.textContent="切換中...";
    isProcessing=false;
    await new Promise(r => setTimeout(r, 200));
    currentFacingMode = currentFacingMode==="user" ? "environment" : "user";
    try {
        await initCamera(currentFacingMode);
    } catch(e) {
        currentFacingMode = currentFacingMode==="user" ? "environment" : "user";
        await initCamera(currentFacingMode).catch(()=>{});
        showTip("⚠️ 切換失敗，已回復原鏡頭");
    } finally {
        isProcessing=true; processFrame();
        switchBtn.disabled=false; updateCameraLabel();
    }
});

function updateCameraLabel() {
    const isUser = currentFacingMode==="user";
    switchBtn.textContent = isUser ? "前鏡頭 🔄" : "後鏡頭 🔄";
    cameraIndicator.textContent = isUser ? "目前：前鏡頭（自拍）" : "目前：後鏡頭";
}

// ── 拍照（iOS Safari 相容）──
captureBtn.addEventListener('click', () => {
    flashLayer.classList.remove('flash-effect');
    void flashLayer.offsetWidth;
    flashLayer.classList.add('flash-effect');
    try {
        // ★ 只截主畫布，格線 canvas 不在截圖範圍內
        const dataURL = mainCanvas.toDataURL('image/jpeg', 0.92);
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);';
        const img = document.createElement('img');
        img.src = dataURL;
        img.style.cssText = 'max-width:92vw;max-height:68vh;border-radius:12px;object-fit:contain;';
        const hint = document.createElement('p');
        hint.textContent = '長按圖片即可儲存到相簿';
        hint.style.cssText = 'color:rgba(255,255,255,0.7);font-size:15px;margin:0;text-align:center;';
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '關閉';
        closeBtn.style.cssText = 'background:rgba(255,255,255,0.12);color:white;border:1px solid rgba(255,255,255,0.25);border-radius:999px;padding:11px 40px;font-size:15px;cursor:pointer;';
        closeBtn.onclick = () => document.body.removeChild(overlay);
        overlay.append(img, hint, closeBtn);
        document.body.appendChild(overlay);
    } catch(e) { alert("擷取失敗，請重新整理後再試。"); }
});

async function processFrame() {
    if (!isProcessing) return;
    try { await pose.send({image: videoEl}); } catch(e) { console.error(e); }
    requestAnimationFrame(processFrame);
}
</script>
</body>
</html>
